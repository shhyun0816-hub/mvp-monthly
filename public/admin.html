<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width"/>
<title>MVP 월간시황 관리자</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;max-width:600px;margin:0 auto;padding:2rem 1rem;background:#fff}
h2{font-size:16px;font-weight:500;margin-bottom:24px}
label{font-size:12px;color:#888;display:block;margin-bottom:4px;margin-top:12px}
input,textarea{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;font-family:sans-serif}
textarea{min-height:90px;resize:vertical}
button#saveBtn{width:100%;padding:11px;background:#111;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:16px}
#msg{margin-top:12px;padding:10px 12px;border-radius:8px;font-size:13px;display:none}
.success{background:#E1F5EE;color:#0F6E56}
.error{background:#FCEBEB;color:#A32D2D}
.tabs{display:flex;border-bottom:1px solid #eee;margin-bottom:24px}
.tab{padding:8px 16px;border:none;background:none;cursor:pointer;font-size:13px;border-bottom:2px solid transparent}
.tab.active{font-weight:500;border-bottom:2px solid #111}
.section{display:none}
.section.active{display:block}
.url-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.url-badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:4px;white-space:nowrap}
.url-text{font-size:12px;font-family:monospace;color:#555;background:#f5f5f5;padding:5px 9px;border-radius:5px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{font-size:11px;padding:4px 10px;border:0.5px solid #ccc;border-radius:5px;cursor:pointer;background:none;white-space:nowrap}
</style>
</head>
<body>
<h2>MVP 월간시황 관리자</h2>

<div class="tabs">
  <button class="tab active" onclick="switchTab('manage')">글 업데이트</button>
  <button class="tab" onclick="switchTab('urls')">URL 4개</button>
</div>

<div id="manage" class="section active">
  <label>게시글 URL *</label>
  <input id="inp-url" placeholder="https://miraeassetmvp.imweb.me/monthly/123"/>
  <label>게시글 제목 *</label>
  <input id="inp-title" placeholder="2025년 7월 월간시황전망"/>
  <label>썸네일 소제목</label>
  <input id="inp-sub" placeholder="글로벌 시장 변동성 점검"/>
  <label>200자 요약</label>
  <textarea id="inp-summary" placeholder="요약 내용..."></textarea>
  <label>관리자 비밀번호 *</label>
  <input id="inp-pw" type="password" placeholder="비밀번호"/>
  <button id="saveBtn" onclick="doSave()">저장 및 4개 URL 즉시 반영</button>
  <div id="msg"></div>
</div>

<div id="urls" class="section">
  <p style="font-size:12px;color:#888;margin-bottom:16px;line-height:1.6">아래 URL을 카카오채널에 한 번만 등록하면, 글이 바뀔 때마다 자동으로 교체됩니다.</p>
  <div class="url-row">
    <span class="url-badge" style="background:#E6F1FB;color:#1A4A7A">섬네일 이미지</span>
    <span class="url-text" id="u-thumb"></span>
    <button class="copy-btn" onclick="copyUrl('u-thumb')">복사</button>
  </div>
  <div class="url-row">
    <span class="url-badge" style="background:#E1F5EE;color:#085041">게시글 제목</span>
    <span class="url-text" id="u-title"></span>
    <button class="copy-btn" onclick="copyUrl('u-title')">복사</button>
  </div>
  <div class="url-row">
    <span class="url-badge" style="background:#FAEEDA;color:#633806">200자 요약</span>
    <span class="url-text" id="u-summary"></span>
    <button class="copy-btn" onclick="copyUrl('u-summary')">복사</button>
  </div>
  <div class="url-row">
    <span class="url-badge" style="background:#EEEDFE;color:#3C3489">게시글 바로가기</span>
    <span class="url-text" id="u-link"></span>
    <button class="copy-btn" onclick="copyUrl('u-link')">복사</button>
  </div>
</div>

<script>
var base = window.location.origin;
document.getElementById('u-thumb').textContent = base + '/api/thumbnail';
document.getElementById('u-title').textContent = base + '/api/title';
document.getElementById('u-summary').textContent = base + '/api/summary';
document.getElementById('u-link').textContent = base + '/api/link';

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.section').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(name).classList.add('active');
  event.target.classList.add('active');
}

function showMsg(text, type) {
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = type;
  el.style.display = 'block';
}

function copyUrl(id) {
  var text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text);
  showMsg('복사됨: ' + text, 'success');
}

async function doSave() {
  var url = document.getElementById('inp-url').value.trim();
  var title = document.getElementById('inp-title').value.trim();
  var sub = document.getElementById('inp-sub').value.trim();
  var summary = document.getElementById('inp-summary').value.trim();
  var password = document.getElementById('inp-pw').value.trim();

  if (!url) { alert('URL을 입력하세요'); return; }
  if (!title) { alert('제목을 입력하세요'); return; }
  if (!password) { alert('비밀번호를 입력하세요'); return; }

  document.getElementById('saveBtn').textContent = '저장 중...';
  showMsg('저장 중...', '');

  try {
    var res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: url, title: title, sub: sub, summary: summary, password: password })
    });
    var text = await res.text();
    var data;
    try { data = JSON.parse(text); } catch(e) { showMsg('파싱오류: ' + text.slice(0,200), 'error'); return; }
    if (data.ok) {
      showMsg('✓ 저장 완료! 4개 URL이 업데이트되었습니다.', 'success');
    } else {
      showMsg('오류: ' + (data.error || JSON.stringify(data)), 'error');
    }
  } catch(e) {
    showMsg('네트워크 오류: ' + e.message, 'error');
  } finally {
    document.getElementById('saveBtn').textContent = '저장 및 4개 URL 즉시 반영';
  }
}
</script>
</body>
</html>
